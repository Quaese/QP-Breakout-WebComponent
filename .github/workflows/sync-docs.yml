name: Build docs

on:
  push:
    branches: [master, research/esbuild]
    paths:
      - "*.js"
      - "images/**"
      - "build.mjs"
      - "package.json"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet docs/ || (git add docs/ && git commit -m "chore: rebuild docs bundle" && git push)
